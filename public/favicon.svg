<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Code brackets: < / > -->
  <text x="64" y="78" font-family="JetBrains Mono, monospace, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">&lt;/&gt;</text>
  <!-- Small Java coffee cup accent -->
  <circle cx="100" cy="24" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="100" y="29" font-size="14" text-anchor="middle" fill="white">&#9749;</text>
</svg>
